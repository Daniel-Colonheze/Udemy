<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centralizando a div</title>

<style>
*{
    margin: 0;
    padding: 0;
    font-family: sans-serif;
}

body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.centralizado{
    border: red solid 2px;
    border-radius: 2px;
    padding: 20px;
}
</style>

</head>

<body>

<div class="centralizado">
    centralizado
</div>

</body>
</html>
